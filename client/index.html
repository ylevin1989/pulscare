<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пульс Заботы</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="preload"
      as="image"
      href="/images/hero-home-640.webp"
      imagesrcset="/images/hero-home-480.webp 480w, /images/hero-home-640.webp 640w, /images/hero-home-960.webp 960w"
      imagesizes="(max-width: 1280px) min(100vw - 32px, 460px), 430px"
      fetchpriority="high"
    />
    <style>
      .first-screen {
        position: relative;
        min-height: 100svh;
      }
      .hero {
        display: grid;
        grid-template-columns: 1fr 0.9fr;
        gap: clamp(16px, 2vw, 28px);
      }
      .hero-media {
        position: relative;
      }
      .hero-image {
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }
      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script type="text/javascript">
      (function () {
        var counterId = 108261092;
        var tagUrl = "https://mc.yandex.ru/metrika/tag.js?id=" + counterId;

        function ensureYmStub() {
          window.ym =
            window.ym ||
            function () {
              (window.ym.a = window.ym.a || []).push(arguments);
            };
          window.ym.l = 1 * new Date();
        }

        function loadTagAndInit() {
          if (document.querySelector('script[src="' + tagUrl + '"]')) return;

          ensureYmStub();
          var script = document.createElement("script");
          script.async = true;
          script.src = tagUrl;
          var firstScript = document.getElementsByTagName("script")[0];
          firstScript.parentNode.insertBefore(script, firstScript);

          window.ym(counterId, "init", {
            ssr: true,
            webvisor: true,
            clickmap: true,
            referrer: document.referrer,
            url: location.href,
            accurateTrackBounce: true,
            trackLinks: true
          });
        }

        function deferredInit() {
          if ("requestIdleCallback" in window) {
            requestIdleCallback(loadTagAndInit, { timeout: 3000 });
          } else {
            setTimeout(loadTagAndInit, 1500);
          }
        }

        if (document.readyState === "complete") {
          deferredInit();
        } else {
          window.addEventListener("load", deferredInit, { once: true });
        }
      })();
    </script>
  </head>
  <body>
    <noscript>
      <div><img src="https://mc.yandex.ru/watch/108261092" style="position:absolute; left:-9999px;" alt="" /></div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
